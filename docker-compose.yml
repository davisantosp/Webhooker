services:
  app:
    build: .
    container_name: webhooker-app
    ports:
      - "8080:8080"
    networks:
      - "webhook-network"
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: webhooker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - "webhook-network"
    volumes:
      - webhook-db-volume:/var/lib/postgresql/data

networks:
  webhook-network:
    driver: bridge

volumes:
  webhook-db-volume:
